{% extends "base.html" %}

{% block title %}Upload - Taylrd{% endblock %}

{% block content %}
<div id="upload-root"></div>

<script type="text/babel">
function UploadPage() {
    const [file, setFile] = React.useState(null);
    const [jobDesc, setJobDesc] = React.useState('');
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState('');
    
    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!file || !jobDesc) {
            setError('Please provide both resume and job description');
            return;
        }
        
        setLoading(true);
        setError('');
        
        const formData = new FormData();
        formData.append('resume', file);
        formData.append('job_description', jobDesc);
        
        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = `/preview/${data.job_id}`;
            } else {
                setError(data.error || 'Processing failed');
            }
        } catch (err) {
            setError('Network error: ' + err.message);
        } finally {
            setLoading(false);
        }
    };
    
    return (
        <div className="upload-container">
            <h2>Create Tailored Resume</h2>
            
            {error && <div className="error-message">{error}</div>}
            
            <form onSubmit={handleSubmit}>
                <div className="form-group">
                    <label>Upload Your Resume (PDF, DOCX, or TXT)</label>
                    <input 
                        type="file" 
                        accept=".pdf,.docx,.txt,.tex"
                        onChange={(e) => setFile(e.target.files[0])}
                        required
                    />
                    {file && <span className="file-name">{file.name}</span>}
                </div>
                
                <div className="form-group">
                    <label>Job Description</label>
                    <textarea
                        value={jobDesc}
                        onChange={(e) => setJobDesc(e.target.value)}
                        placeholder="Paste the job description here..."
                        rows="10"
                        required
                    />
                </div>
                
                <button type="submit" disabled={loading} className="submit-btn">
                    {loading ? 'Processing with AI...' : 'Generate Tailored Resume'}
                </button>
            </form>
            
            {loading && (
                <div className="loading-overlay">
                    <div className="spinner"></div>
                    <p>Analyzing job requirements...</p>
                    <p className="sub">Generating LaTeX with Gemini AI</p>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('upload-root')).render(<UploadPage />);
</script>

<style>
.upload-container {
    max-width: 800px;
    margin: 2rem auto;
    padding: 2rem;
}
.form-group {
    margin-bottom: 1.5rem;
}
label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #333;
}
input[type="file"] {
    width: 100%;
    padding: 0.5rem;
    border: 2px dashed #ccc;
    border-radius: 8px;
}
textarea {
    width: 100%;
    padding: 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    resize: vertical;
}
.file-name {
    display: block;
    margin-top: 0.5rem;
    color: #667eea;
    font-size: 0.9rem;
}
.submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: opacity 0.2s;
}
.submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}
.error-message {
    background: #fee;
    color: #c33;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
}
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255,255,255,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.sub {
    color: #666;
    font-size: 0.9rem;
}
</style>
{% endblock %}
